<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>R2 Gallery</title>
  <meta name="description" content="快速、美观的图片视频画廊，基于 Cloudflare R2" />

  <!-- WeChat optimization -->
  <meta name="format-detection" content="telephone=no" />
  <meta name="x5-orientation" content="portrait" />
  <meta name="x5-fullscreen" content="true" />
  <meta name="x5-page-mode" content="app" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-touch-fullscreen" content="yes" />

  <!-- Preconnect to origin for faster asset loading -->
  <link rel="preconnect" href="https://tu.zhangyubi.cn" crossorigin />
  <link rel="dns-prefetch" href="https://tu.zhangyubi.cn" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gallery" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />

  <!-- Prevent dark mode FOUC -->
  <script>
    (function() {
      try {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch(e) {}
    })();
  </script>

  <!-- Critical resource hints — browser starts fetching immediately -->
  <link rel="modulepreload" crossorigin href="/src/main.tsx">

  <!-- Inline critical CSS for loading skeleton -->
  <style>
    .app-loading {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #f9fafb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .dark .app-loading { background: #111827; }
    .loading-header {
      height: 56px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
    }
    .dark .loading-header { background: #1f2937; border-color: #374151; }
    .loading-skeleton {
      background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    .dark .loading-skeleton {
      background: linear-gradient(90deg, #374151 25%, #4b5563 50%, #374151 75%);
      background-size: 200% 100%;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .loading-grid {
      flex: 1;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      align-content: start;
    }
    .loading-card {
      aspect-ratio: 1;
      border-radius: 12px;
    }
    @media (max-width: 640px) {
      .loading-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 12px; }
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
  <div id="root">
    <!-- Loading skeleton — visible until React hydrates -->
    <div class="app-loading">
      <div class="loading-header">
        <div class="loading-skeleton" style="width:24px;height:24px"></div>
        <div class="loading-skeleton" style="width:120px;height:20px"></div>
        <div style="flex:1"></div>
        <div class="loading-skeleton" style="width:80px;height:32px;border-radius:8px"></div>
      </div>
      <div class="loading-grid">
        <div class="loading-skeleton loading-card"></div>
        <div class="loading-skeleton loading-card"></div>
        <div class="loading-skeleton loading-card"></div>
        <div class="loading-skeleton loading-card"></div>
        <div class="loading-skeleton loading-card"></div>
        <div class="loading-skeleton loading-card"></div>
      </div>
    </div>
  </div>
  <script type="module" crossorigin src="/src/main.tsx"></script>
</body>
</html>
